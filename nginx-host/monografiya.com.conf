# Host nginx config for monografiya.com.
#
# Use this when the server already runs a system nginx (apt-installed)
# fronting other projects — drop into /etc/nginx/sites-available/ and
# symlink to sites-enabled/. After `nginx -s reload`, run:
#
#   certbot --nginx -d monografiya.com -d www.monografiya.com -d files.monografiya.com
#
# Certbot's nginx plugin will append the matching `listen 443 ssl` blocks
# and rewrite each port-80 server to redirect → HTTPS.
#
# Compose services these proxy to:
#   - backend  : 127.0.0.1:8307  (FastAPI)
#   - frontend : 127.0.0.1:8308  (Nuxt 3)
#   - minio    : 127.0.0.1:8302  (S3 API for presigned URLs)

# ---------- monografiya.com + www ----------
server {
    server_name monografiya.com www.monografiya.com;

    client_max_body_size 110m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/atom+xml
        application/rss+xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/woff
        font/woff2;

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:8307;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # Health probe
    location = /health {
        proxy_pass         http://127.0.0.1:8307/health;
        access_log         off;
    }

    # SEO entry points (FastAPI, no /api/v1 prefix)
    location = /sitemap.xml {
        proxy_pass         http://127.0.0.1:8307/sitemap.xml;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass         http://127.0.0.1:8307/robots.txt;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Long-cached Nuxt build assets
    location /_nuxt/ {
        proxy_pass         http://127.0.0.1:8308;
        proxy_set_header   Host              $host;
        proxy_cache_valid  200 30d;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # Everything else → Nuxt SSR
    location / {
        proxy_pass         http://127.0.0.1:8308;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/monografiya-access.log;
    error_log  /var/log/nginx/monografiya-error.log;

    listen 80;
    listen [::]:80;
}

# ---------- files.monografiya.com → MinIO ----------
server {
    server_name files.monografiya.com;

    # MinIO streams large objects; let it choose its own body size.
    client_max_body_size 0;

    location / {
        proxy_pass              http://127.0.0.1:8302;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    access_log /var/log/nginx/monografiya-files-access.log;
    error_log  /var/log/nginx/monografiya-files-error.log;

    listen 80;
    listen [::]:80;
}
