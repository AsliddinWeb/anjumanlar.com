# ============================================================
# Monografiya — production docker-compose
#
# Differences vs. docker-compose.yml (dev):
#  - No volume-mounted source — code is baked into the image.
#  - Internal services (postgres, redis, meilisearch, mailhog) bind to
#    127.0.0.1:<8300+> on the host so the host nginx (if any) can still
#    reach them, but the public NIC only exposes 80/443 via the
#    containerised nginx.
#  - Backend runs uvicorn with workers (no --reload).
#  - Frontend runs the Nuxt prebuilt server (.output/server/index.mjs).
#  - Nginx container terminates 80/443; certbot is run separately
#    against this nginx (see scripts/certbot.sh).
# ============================================================

name: monografiya

networks:
  monografiya:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  certbot_certs:
  certbot_www:

services:

  # ---------- PostgreSQL 16 ----------
  postgres:
    image: postgres:16-alpine
    container_name: monografiya-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Tashkent}
      PGTZ: ${TZ:-Asia/Tashkent}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-8300}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [monografiya]

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: monografiya-redis
    restart: always
    command: redis-server --appendonly yes --save 60 1
    ports:
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-8301}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [monografiya]

  # ---------- MinIO ----------
  minio:
    image: minio/minio:latest
    container_name: monografiya-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_PUBLIC_ENDPOINT}
    ports:
      - "${MINIO_API_BIND:-127.0.0.1}:${MINIO_API_PORT:-8302}:9000"
      - "${MINIO_CONSOLE_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-8303}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [monografiya]

  minio-init:
    image: minio/mc:latest
    container_name: monografiya-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_BOOKS: ${MINIO_BUCKET_BOOKS:-books}
      MINIO_BUCKET_BOOKS_WM: ${MINIO_BUCKET_BOOKS_WM:-books-watermarked}
      MINIO_BUCKET_COVERS: ${MINIO_BUCKET_COVERS:-covers}
      MINIO_BUCKET_AVATARS: ${MINIO_BUCKET_AVATARS:-avatars}
      MINIO_BUCKET_DEMOS: ${MINIO_BUCKET_DEMOS:-demos}
      MINIO_BUCKET_BLOG: ${MINIO_BUCKET_BLOG:-blog}
    volumes:
      - ./docker/minio/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks: [monografiya]
    restart: "no"

  # ---------- Meilisearch ----------
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: monografiya-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILISEARCH_BIND:-127.0.0.1}:${MEILISEARCH_PORT:-8304}:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [monografiya]

  # ---------- Backend (FastAPI) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: monografiya-backend:prod
    container_name: monografiya-backend
    restart: always
    env_file: [.env]
    environment:
      ENVIRONMENT: production
      PYTHONUNBUFFERED: "1"
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8307}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [monografiya]

  # ---------- Frontend (Nuxt 3, prebuilt) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
        NUXT_PUBLIC_SITE_NAME: ${NUXT_PUBLIC_SITE_NAME:-Monografiya}
        NUXT_PUBLIC_DEFAULT_LOCALE: ${NUXT_PUBLIC_DEFAULT_LOCALE:-uz}
    image: monografiya-frontend:prod
    container_name: monografiya-frontend
    restart: always
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "3000"
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_BASE_INTERNAL: ${NUXT_API_BASE_INTERNAL}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
      NUXT_PUBLIC_SITE_NAME: ${NUXT_PUBLIC_SITE_NAME:-Monografiya}
      NUXT_PUBLIC_DEFAULT_LOCALE: ${NUXT_PUBLIC_DEFAULT_LOCALE:-uz}
      NUXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8308}:3000"
    depends_on:
      backend:
        condition: service_started
    networks: [monografiya]

  # ---------- Celery worker ----------
  celery_worker:
    image: monografiya-backend:prod
    container_name: monografiya-celery-worker
    restart: always
    env_file: [.env]
    environment:
      ENVIRONMENT: production
      PYTHONUNBUFFERED: "1"
    command:
      ["celery", "-A", "app.tasks.celery_app:celery_app", "worker",
       "--loglevel=info", "--concurrency=2"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [monografiya]

  # ---------- Celery beat ----------
  celery_beat:
    image: monografiya-backend:prod
    container_name: monografiya-celery-beat
    restart: always
    env_file: [.env]
    environment:
      ENVIRONMENT: production
      PYTHONUNBUFFERED: "1"
    command:
      ["celery", "-A", "app.tasks.celery_app:celery_app", "beat",
       "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [monografiya]

  # ---------- Nginx (TLS terminator + reverse proxy) ----------
  # Parked behind the "docker-nginx" profile — only starts when invoked
  # explicitly (`docker compose --profile docker-nginx up -d`). On servers
  # that already run a host-level nginx (apt-installed) for other projects,
  # leave this disabled and configure the host nginx to proxy to
  # 127.0.0.1:8307 (backend) and 127.0.0.1:8308 (frontend) instead — see
  # nginx-host/monografiya.com.conf for a drop-in config.
  nginx:
    image: nginx:1.27-alpine
    container_name: monografiya-nginx
    restart: always
    profiles: ["docker-nginx"]
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./nginx/dhparam:/etc/nginx/dhparam:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks: [monografiya]

  # ---------- Certbot (paired with the docker nginx variant) ----------
  certbot:
    image: certbot/certbot:latest
    container_name: monografiya-certbot
    profiles: ["docker-nginx"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"]
    restart: always
    networks: [monografiya]
