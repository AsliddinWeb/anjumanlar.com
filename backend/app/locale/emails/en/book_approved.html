{% extends "_layout.html" %}
{% set locale = "en" %}
{% block content %}
<h1 style="margin:0 0 16px;font-size:22px;color:#1a1410;">Your book is approved</h1>
<p style="margin:0 0 16px;">
  Hi {{ full_name }}. Your book <strong>"{{ book_title }}"</strong> has
  passed moderation and is now live in the catalogue.
</p>
<p style="margin:0 0 24px;">
  <a href="{{ site_url }}/en/books/{{ book_slug }}" style="display:inline-block;padding:10px 18px;background:#8b4513;color:#faf7f2;border-radius:4px;text-decoration:none;font-weight:600;">
    View book
  </a>
</p>
<p style="margin:24px 0 0;color:#8b7e70;font-size:13px;">
  Sales and earnings stats live in your author dashboard.
</p>
{% endblock %}
