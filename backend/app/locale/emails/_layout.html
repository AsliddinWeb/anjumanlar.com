{# Shared layout fragment for transactional emails. Locale-specific templates
   include this and inject their body into the {% block content %} slot. #}
<!doctype html>
<html lang="{{ locale | default('uz') }}">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ site_name }}</title>
</head>
<body style="margin:0;padding:0;background:#faf7f2;font-family:Inter,Arial,sans-serif;color:#1a1410;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td align="center" style="padding:24px;">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0"
               style="background:#ffffff;border:1px solid #e8dfd0;border-radius:6px;">
          <tr>
            <td style="padding:24px 32px;border-bottom:1px solid #e8dfd0;">
              <a href="{{ site_url }}" style="color:#8b4513;text-decoration:none;font-weight:600;font-size:18px;">
                {{ site_name }}
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;line-height:1.55;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;border-top:1px solid #e8dfd0;color:#8b7e70;font-size:12px;">
              © {{ site_name }} · <a href="{{ site_url }}" style="color:#8b7e70;">{{ site_url }}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
