{% extends "_layout.html" %}
{% set locale = "ru" %}
{% block content %}
<h1 style="margin:0 0 16px;font-size:22px;color:#1a1410;">Книга одобрена</h1>
<p style="margin:0 0 16px;">
  Здравствуйте, {{ full_name }}. Ваша книга <strong>«{{ book_title }}»</strong>
  прошла модерацию и теперь доступна в каталоге.
</p>
<p style="margin:0 0 24px;">
  <a href="{{ site_url }}/ru/books/{{ book_slug }}" style="display:inline-block;padding:10px 18px;background:#8b4513;color:#faf7f2;border-radius:4px;text-decoration:none;font-weight:600;">
    Открыть книгу
  </a>
</p>
<p style="margin:24px 0 0;color:#8b7e70;font-size:13px;">
  Статистику продаж и доходов вы можете отслеживать в кабинете автора.
</p>
{% endblock %}
