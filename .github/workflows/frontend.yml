name: frontend

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  lint-typecheck-build:
    name: lint + typecheck + build
    runs-on: ubuntu-latest

    env:
      NUXT_TELEMETRY_DISABLED: "1"
      NUXT_PUBLIC_API_BASE: http://localhost:8307/api/v1
      NUXT_PUBLIC_SITE_URL: http://localhost:8308

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint
        continue-on-error: true # remove once eslint rules are tuned

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: anjumanlar-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
