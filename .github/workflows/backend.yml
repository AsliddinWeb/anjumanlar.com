name: backend

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - ".env.example"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - ".env.example"

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    name: lint + pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anjumanlar
          POSTGRES_PASSWORD: anjumanlar
          POSTGRES_DB: anjumanlar
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U anjumanlar"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+asyncpg://anjumanlar:anjumanlar@localhost:5432/anjumanlar
      DATABASE_URL_SYNC: postgresql://anjumanlar:anjumanlar@localhost:5432/anjumanlar
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      JWT_SECRET_KEY: ci-test-secret-not-used-in-prod
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bootstrap Postgres extensions
        # ``citext``, ``pgcrypto``, etc. live in docker/postgres/init.sql for
        # the dev stack; CI's postgres service skips that script so we apply
        # it by hand before migrations run.
        env:
          PGPASSWORD: anjumanlar
        run: |
          psql -h localhost -U anjumanlar -d anjumanlar -f ../docker/postgres/init.sql

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Pytest (unit + non-integration)
        id: pytest
        # Capture output to a file so we can publish it as an artifact even
        # when the step fails — log download via the API needs admin auth,
        # public artifacts don't.
        run: |
          set -o pipefail
          pytest -v --tb=short -m "not integration" 2>&1 | tee /tmp/pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: /tmp/pytest.log

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: anjumanlar-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
