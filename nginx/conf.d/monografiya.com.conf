# Monografiya — production reverse proxy.
#
# HTTP only on purpose: certbot will add the matching server { listen 443; }
# block + ssl_certificate paths automatically when the cert is issued
# (`certbot --nginx -d monografiya.com -d www.monografiya.com`).
#
# Once SSL is in place certbot also rewrites the listen 80 block to a
# 301 redirect — leave that to the tool, don't pre-write it here, or the
# rewrite will conflict.

# Upstream definitions — the docker network resolves these container names.
upstream monografiya_backend {
    server backend:8000;
    keepalive 32;
}

upstream monografiya_frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name monografiya.com www.monografiya.com;

    # Required for `certbot certonly --webroot -w /var/www/certbot`.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Body limits — book PDFs land on /api/v1/books/.../file (Phase 2);
    # cover/avatar uploads sit well under this.
    client_max_body_size 110m;

    # Gzip — Nuxt already pre-compresses static assets, but the
    # API responses (JSON) are still worth squeezing.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/atom+xml
        application/rss+xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---- API ----
    location /api/ {
        proxy_pass         http://monografiya_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # ---- Health checks ----
    location = /health {
        proxy_pass         http://monografiya_backend/health;
        access_log         off;
    }

    # ---- SEO entry points (FastAPI, no /api/v1 prefix) ----
    location = /sitemap.xml {
        proxy_pass         http://monografiya_backend/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass         http://monografiya_backend/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Everything else → Nuxt ----
    location / {
        proxy_pass         http://monografiya_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }

    # ---- Long-cached static assets emitted by Nuxt's build ----
    location /_nuxt/ {
        proxy_pass         http://monografiya_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 30d;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }
}

# ---- MinIO public objects (covers, demos, watermarked PDFs) ----
#
# MinIO presigned URLs embed the public hostname directly, so signing
# only works if the browser hits exactly the host we register with the
# SDK. We use a dedicated ``files.monografiya.com`` subdomain so the
# bucket/key portion of the URL stays at the path root (no rewrite),
# which is what the SDK expects.
#
# DNS: add an A record for files.monografiya.com pointing at the same IP.
# Certbot: include ``-d files.monografiya.com`` when issuing the cert.
upstream monografiya_minio {
    server minio:9000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name files.monografiya.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    client_max_body_size 0;

    location / {
        proxy_pass         http://monografiya_minio;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
